<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تسجيل جديد - معمل ميدلاب</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="images/logo.png" type="image/x-icon" rel="icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c786c;
            --secondary-color: #2c786c;
            --accent-color: #f8b400;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        .register-container {
            max-width: 500px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .register-header h2 {
            color: var(--primary-color);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }

        .register-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .register-btn:hover {
            background-color: var(--secondary-color);
        }

        .register-footer {
            text-align: center;
            margin-top: 20px;
        }

        .register-footer a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .error-message {
            color: #d9534f;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }

        .password-requirements {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }

        .mobile-nav {
            display: none;
        }
    </style>
</head>
<body>
    <header class="mobile-header">
        <div class="container">
            <button class="menu-toggle">
                <i class="fas fa-bars"></i>
            </button>
            <h1>تسجيل جديد</h1>
        </div>
    </header>

    <div class="register-container">
        <div class="register-header">
            <h2>إنشاء حساب جديد</h2>
            <p>الرجاء تعبئة البيانات التالية لإنشاء حساب</p>
        </div>

        <div id="error-message" class="error-message"></div>

        <form id="register-form">
            <div class="form-group">
                <label for="fullname">الاسم الكامل</label>
                <input type="text" id="fullname" name="fullname" required>
            </div>
            <div class="form-group">
                <label for="username">اسم المستخدم</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="email">البريد الإلكتروني</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="phone">رقم الهاتف</label>
                <input type="tel" id="phone" name="phone" required>
            </div>
            <div class="form-group">
                <label for="password">كلمة المرور</label>
                <input type="password" id="password" name="password" required>
                <div class="password-requirements">يجب أن تحتوي كلمة المرور على 8 أحرف على الأقل</div>
            </div>
            <div class="form-group">
                <label for="confirm-password">تأكيد كلمة المرور</label>
                <input type="password" id="confirm-password" name="confirm-password" required>
            </div>
            <button type="submit" class="register-btn">تسجيل الحساب</button>
        </form>

        <div class="register-footer">
            <p>لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a></p>
        </div>
    </div>
<script src="js/auth.js"></script>
  
</body>
</html>
