<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المساعد الذكي - عيادات النخيل الطبية</title>
    <link rel="stylesheet" href="css/style.css">
     <link  href="images/logo.png" type="image/x-icon" rel="icon">
    <link rel="stylesheet" href="css/ai.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <h2 class="section-title">المساعد الذكي</h2>           
    </header>
    <section class="ai-assistant section-padding">
        <div class="container">
            <div class="ai-container">
                <div class="ai-header">
                    <div class="ai-avatar">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="ai-info">
                        <h3>مساعد المعمل الذكي</h3>
                        <p>كيف يمكنني مساعدتك اليوم؟</p>
                    </div>
                </div>
                
                <div class="ai-chat-container">
                    <div class="ai-message ai-response">
                        <div class="message-content">
                            <p>مرحبًا! أنا مساعد المعمل الذكي. كيف يمكنني مساعدتك اليوم؟</p>
                        </div>
                    </div>
                    
                    <div class="quick-questions">
                        <h4>أسئلة سريعة:</h4>
                        <div class="questions-grid">
                            <button class="question-btn" data-question="كيف يمكنني حجز موعد؟">كيف يمكنني حجز موعد؟</button>
                            <button class="question-btn" data-question="ما هي ساعات العمل؟">ما هي ساعات العمل؟</button>
                            <button class="question-btn" data-question="أين يقع المعمل؟">أين يقع المعمل؟</button>
                            <button class="question-btn" data-question="تفاصيل عن الاسعار؟">تفاصيل عن الاسعار؟</button>  
                            <button class="question-btn" data-question="ما هي طرق الدفع المتاحة؟">ما هي طرق الدفع المتاحة؟</button>
                        </div>
                    </div>
                </div>
                
                
            </div>
        </div>
    </section>

    <footer class="footer">

    </footer>

    <script src="js/ai.js"></script>
</body>
</html>
